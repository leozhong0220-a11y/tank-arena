<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>360坦克对决 — 联机版 M4</title>
<style>
*{-webkit-tap-highlight-color:transparent}
body,button,canvas,#game{user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
input{user-select:text !important;-webkit-user-select:text !important}
body{margin:0;background:#151812;color:#E8E6DD;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px;min-height:100vh;box-sizing:border-box}
.card{background:#1F241C;border:1px solid #353C2F;border-radius:14px;padding:28px;width:100%;max-width:380px;box-sizing:border-box}
h1{font-size:20px;margin:0 0 18px;font-weight:600}
input{width:100%;box-sizing:border-box;padding:10px 12px;margin:6px 0 14px;background:#13160F;border:1px solid #454C3E;border-radius:8px;color:#E8E6DD;font-size:15px;outline:none}
input:focus{border-color:#3FA98B}
button{background:#2B3026;color:#E8E6DD;border:1px solid #454C3E;border-radius:10px;font-size:15px;cursor:pointer;padding:10px 16px}
button:hover{background:#3A4133}
button:disabled{opacity:0.5;cursor:wait}
.primary{background:#2A6E58;border-color:#3FA98B}
.primary:hover{background:#338066}
.row{display:flex;gap:10px;align-items:center}
.row input{margin:0}
.err{color:#E07B6E;font-size:13px;min-height:18px;margin-top:10px}
.divider{text-align:center;color:#6B7163;font-size:12px;margin:16px 0}
#game{display:none;width:100%;max-width:660px}
.hud{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin:0 0 10px;font-size:13px;color:#9BA194}
.hud b{font-weight:600;color:#E8E6DD}
canvas{width:100%;display:block;border-radius:12px;touch-action:none;cursor:crosshair;outline:none}
.below{display:flex;justify-content:space-between;align-items:flex-start;margin-top:12px;gap:16px;flex-wrap:wrap}
.pad{display:grid;grid-template-columns:repeat(3,50px);grid-template-rows:repeat(2,50px);gap:6px}
.pad button{font-size:16px}
#roster{font-size:13px;line-height:1.9;color:#C9CEC2;text-align:right}
.fire{width:64px;height:64px;border-radius:50%;background:#7A3A33;border-color:#B0584E;font-size:14px;align-self:center}
.fire:hover{background:#8E463E}
.controls{display:flex;gap:18px;align-items:center}
.code{background:#13160F;border:1px solid #454C3E;border-radius:6px;padding:2px 10px;font-family:monospace;font-size:15px;letter-spacing:3px;color:#7FD4B5}

/* ---------- 手机全屏模式(.mfs):画布占满屏幕,控件悬浮在游戏画面之内 ---------- */
#game.mfs{position:fixed;inset:0;max-width:none;margin:0;padding:0;background:#0F120D;display:flex;align-items:center;justify-content:center;z-index:10}
#game.mfs .hud{position:absolute;top:6px;left:12px;right:12px;z-index:12;margin:0;font-size:12px;gap:10px;pointer-events:none}
#game.mfs .hud button{pointer-events:auto}
#game.mfs canvas{border-radius:0;width:auto}
#game.mfs .below{display:none}
#stick{display:none;position:absolute;left:24px;bottom:24px;width:124px;height:124px;border-radius:50%;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.18);z-index:12;touch-action:none}
#knob{position:absolute;left:50%;top:50%;width:54px;height:54px;border-radius:50%;background:rgba(232,230,221,0.22);border:2px solid rgba(232,230,221,0.45);transform:translate(-50%,-50%);touch-action:none;pointer-events:none}
#game.mfs #stick{display:block}
#btnFireM{display:none;position:absolute;right:28px;bottom:36px;width:88px;height:88px;border-radius:50%;background:rgba(122,58,51,0.75);border:2px solid #B0584E;font-size:17px;z-index:12;touch-action:none}
#game.mfs #btnFireM{display:block}
/* 竖屏强制横屏:把整个游戏容器旋转 90°,尺寸宽高互换 */
#game.mfs.rot{inset:auto;left:50%;top:50%;width:100vh;height:100vw;transform:translate(-50%,-50%) rotate(90deg)}
body.touchmode.ingame{padding:0}
</style>
</head>
<body>

<!-- ============ 大厅 ============ -->
<div class="card" id="lobby">
  <h1>360坦克对决 · 联机版</h1>
  <label>你的昵称</label>
  <input id="nameInput" maxlength="10" placeholder="比如:Leo">
  <button class="primary" id="btnCreate" style="width:100%">创建房间</button>
  <div class="divider">— 或者加入朋友的房间 —</div>
  <div class="row">
    <input id="codeInput" maxlength="4" placeholder="4 位房间码" style="text-transform:uppercase;flex:1">
    <button id="btnJoin">加入</button>
  </div>
  <div class="err" id="lobbyError"></div>
</div>

<!-- ============ 游戏 ============ -->
<div id="game">
  <div class="hud">
    <span>房间 <span class="code" id="roomCode">----</span></span>
    <span>地图 <b id="mapName">—</b></span>
    <span>在线 <b id="playerCount">1</b> 人</span>
    <span style="color:#6B7163">先到 10 杀获胜 · 捡 ? 箱拿道具</span>
    <button id="btnSound" title="音效开关" style="margin-left:auto;padding:4px 10px;font-size:14px">&#128266;</button>
  </div>
  <canvas id="cv" width="624" height="528" tabindex="0"></canvas>
  <div class="below">
    <div class="controls">
      <div class="pad">
        <span></span><button id="btnUp">&#8593;</button><span></span>
        <button id="btnLeft">&#8592;</button><button id="btnDown">&#8595;</button><button id="btnRight">&#8594;</button>
      </div>
      <button id="btnFire" class="fire">开炮</button>
    </div>
    <div id="roster"></div>
  </div>
  <!-- 手机模式悬浮控件(桌面隐藏) -->
  <div id="stick"><div id="knob"></div></div>
  <button id="btnFireM">开炮</button>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
